name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests
        run: |
          xcodebuild \
            -project MeetingReminder.xcodeproj \
            -scheme MeetingReminder \
            -configuration Debug \
            test
