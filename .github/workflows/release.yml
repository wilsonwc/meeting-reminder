name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Resolve version from tag
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Bump version in Info.plist + pbxproj
        run: bash scripts/bump-version.sh "${{ steps.v.outputs.version }}"

      - name: Build DMG
        run: make installer VERSION="${{ steps.v.outputs.version }}"

      - name: Compute SHA256
        id: sha
        run: |
          SHA=$(shasum -a 256 "MeetingReminder-${{ steps.v.outputs.version }}.dmg" | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: MeetingReminder-${{ steps.v.outputs.version }}.dmg
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Cask in nilBora/homebrew-apps
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          VERSION: ${{ steps.v.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: bash scripts/update-cask.sh
