version: 2
project_name: meeting-reminder

before:
  hooks:
    - bash scripts/bump-version.sh {{ trimprefix .Tag "v" }}
    - make installer VERSION={{ trimprefix .Tag "v" }}

builds:
  - skip: true

release:
  github:
    owner: nilBora
    name: meeting-reminder
  extra_files:
    - glob: "MeetingReminder-*.dmg"
  draft: false
  prerelease: auto

homebrew_casks:
  - name: meeting-reminder
    repository:
      owner: nilBora
      name: homebrew-apps
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/nilBora/meeting-reminder"
    description: "Native macOS menu bar meeting reminder with full-screen overlay"
    url:
      template: "https://github.com/nilBora/meeting-reminder/releases/download/{{ .Tag }}/MeetingReminder-{{ trimprefix .Tag \"v\" }}.dmg"
    custom_block: |
      depends_on macos: ">= :ventura"
    zap:
      trash:
        - "~/Library/Preferences/com.meetingreminder.app.plist"
        - "~/Library/Caches/com.meetingreminder.app"
